services:
  postgres:
    image: postgres:16-alpine
    container_name: launchmint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: launchmint
      POSTGRES_PASSWORD: launchmint
      POSTGRES_DB: launchmint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchmint"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: launchmint-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  typesense:
    image: typesense/typesense:0.25.2
    container_name: launchmint-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: dev-typesense-key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    command: --enable-cors

  localstack:
    image: localstack/localstack:3.4
    container_name: launchmint-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  redis_data:
  typesense_data:
  localstack_data:
